paths:
  /api/v1/auth/register:
    post:
      summary: Register
      responses:
        '200':
          description: Success
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: 'true'
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: >-
                Origin, Content-Type, api_key, Content-Length, Accept-Encoding,
                X-CSRF-Token, Authorization
            Access-Control-Allow-Methods:
              schema:
                type: string
              example: POST, GET, OPTIONS, PATCH, PUT, DELETE, UPDATE
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: '*'
            Access-Control-Expose-Headers:
              schema:
                type: string
              example: Content-Length
            Access-Control-Max-Age:
              schema:
                type: integer
              example: '86400'
            Cache-Control:
              schema:
                type: string
              example: no-cache
            Date:
              schema:
                type: string
              example: Sun, 20 Apr 2025 08:02:00 GMT
            Content-Length:
              schema:
                type: integer
              example: '216'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      email:
                        type: string
                        format: email
                      display_name:
                        type: string
                      bio:
                        type: string
              example:
                success: true
                message: failed register account
                data:
                  id: 32a385b9-ba3e-46e1-aa38-bbf898aa9edc
                  username: azka rizqullah
                  email: azkarizqullah929@gmail.com
                  display_name: Azkuun
                  bio: Aku Sigma boy
        '409':
          description: Already Exist
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: boolean
              example: 'true'
            Access-Control-Allow-Headers:
              schema:
                type: string
              example: >-
                Origin, Content-Type, api_key, Content-Length, Accept-Encoding,
                X-CSRF-Token, Authorization
            Access-Control-Allow-Methods:
              schema:
                type: string
