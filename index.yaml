            Content-Length:
              schema:
                type: integer
              example: '107'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  success:
                    type: boolean
                  message:
                    type: string
                  error:
                    type: string
              example:
                code: 0
                success: false
                message: failed register account
                error: user with this email already exist
